name: Latest blog post workflow
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: gautamkrishnar/blog-post-workflow@6a6e64abd1f651445da8e59611d0ca0110979aa5 # 1.9.4
        with:
          feed_list: "https://hotoolong.hatenablog.com/rss"
          max_post_count: 5
          comment_tag_name: "BLOG-POST-LIST"
